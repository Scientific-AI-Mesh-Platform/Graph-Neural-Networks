name: CI for mesh-hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install pytest black mypy ruff
    - name: Format Check (Black)
      run: black --check .
    - name: Linting (Ruff)
      run: ruff check .
    - name: Type Checking (MyPy)
      run: mypy mesh_hub
    - name: Run Tests
      run: pytest tests/
